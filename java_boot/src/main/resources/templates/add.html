<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/add" method="post">
    <table>
        <tr>
            <td>Title：</td>
            <td>
                <input type="text" name="title"/>
            </td>
        </tr>
        <tr>
            <td>Content：</td>
            <td>
                <input type="text" name="content"/>
            </td>
        </tr>
        <tr>
            <td>Opername：</td>
            <td>
                <input type="text" name="opername"/>
            </td>
        </tr>

                <input type="submit" value="提交"/>
            </td>
            <td>
                <input type="reset" value="重置"/>
            </td>
        </tr>
    </table>
</form>
</body>
</html>
